<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header>
    <nav>
      <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
      <ul>
        <li><a href="{{ '/' | relative_url }}">Universities</a></li>
        <li><a href="{{ '/profile/' | relative_url }}">My Profile</a></li>
        <li><a href="{{ '/criteria/' | relative_url }}">Criteria</a></li>
      </ul>
    </nav>
  </header>
  <main>
    {{ content }}
  </main>
  <footer>
    <p>University search — updated {{ site.time | date: "%B %Y" }}</p>
  </footer>
</body>
</html>
