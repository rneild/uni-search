# Insights — conclusions, realisations, and quotes gathered along the way
#
# Each insight is confirmed by the applicant before being committed here.
# Do not add an insight without first checking she agrees with the wording.
#
# Fields:
#   date        — when the insight was last confirmed (update if refined)
#   category    — one of: priorities | self-knowledge | universities | process | finance
#   text        — the insight itself, in plain language; edit in place when refined
#   quote       — her exact words, if the insight came directly from something she said
#   source      — where it came from: "applicant" | "research" | "conversation" | "parent"
#   tags        — optional cross-reference tags (free text)
#   confirmed   — must be true before committing; never set to true without her agreement
#   evolved     — optional note explaining how/why this insight changed from its original form
#
# Maintenance rules:
#   - Before adding a new insight, check for conflicts with existing ones
#   - If a conflict exists, resolve it with the applicant before committing
#   - When an insight is refined, edit text in place and update the date
#   - Do not leave two contradictory insights both standing
#
# Category guide:
#   priorities      — what she has discovered actually matters to her
#   self-knowledge  — things she has learned about herself through the process
#   universities    — realisations about specific institutions or types of institution
#   process         — insights about how to approach the decision or application
#   finance         — realisations about cost, aid, or financial trade-offs

insights:

  - date: "2026-03-22"
    category: priorities
    text: >
      Climate is a near-dealbreaker, not just a preference. A warm climate
      isn't just inconvenient — it actively affects her mood. She experiences
      reverse seasonal depression and genuinely thrives in cold, grey weather.
      This should filter universities early, not late.
    quote: "I'm allergic to heat."
    source: applicant
    tags: [climate, location, dealbreaker]
    confirmed: true

